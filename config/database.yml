default: &default
  adapter: mysql2
  encoding: utf8mb4
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: root
  password: root
  host: 127.0.0.1

development:
  <<: *default
  database: laptop_world_store_development

test:
  <<: *default
  database: laptop_world_store_test

production:
  <<: *default
  url: <%= ENV["MYSQL_URL"] %>
